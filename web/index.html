<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonOn - Player de Mídia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" aria-label="Lista de arquivos">
            <div class="sidebar-header">
                <h1 class="logo">Neon<span class="accent">On</span></h1>
                <button 
                    class="btn-icon" 
                    id="btnToggleAutoplay" 
                    title="Alternar reprodução automática" 
                    aria-label="Alternar autoplay"
                >▶</button>
            </div>
            
            <div class="folder-select">
                <button class="btn-neon btn-full" id="btnSelectFolder">
                    📁 Selecionar Pasta
                </button>
            </div>
            
            <ul class="video-list" id="videoList" role="list" aria-label="Lista de arquivos de mídia">
                <li class="empty-state" role="listitem">Nenhum arquivo carregado</li>
            </ul>
            
            <div class="sidebar-footer">
                <span class="counter" id="videoCounter"></span>
                <button 
                    class="btn-icon btn-reset" 
                    id="btnReset" 
                    title="Limpar e recomeçar" 
                    aria-label="Resetar player"
                >⟲</button>
            </div>
        </aside>
        
        <!-- Player Area -->
        <main class="player-area">
            <div class="video-container" id="videoContainer">
                <video id="videoPlayer" controls aria-label="Reprodutor de vídeo"></video>
                <img id="imageViewer" alt="Visualizador de imagem" style="display: none;">
                
                <div class="drop-overlay" id="dropOverlay" aria-hidden="true">
                    <div class="drop-content">
                        <span class="drop-icon" aria-hidden="true">▶</span>
                        <p>Arraste uma pasta de vídeos ou imagens aqui</p>
                        <p class="drop-sub">ou clique em "Selecionar Pasta"</p>
                    </div>
                </div>
            </div>
            
            <!-- BARRA DE PROGRESSO -->
            <div class="progress-container">
                <input 
                    type="range" 
                    id="progressBar" 
                    min="0" 
                    max="100" 
                    value="0" 
                    class="progress-bar"
                    aria-label="Barra de progresso"
                >
            </div>
            
            <div class="controls-bar">
                <button class="btn-icon" id="btnPrev" title="Anterior (←)" aria-label="Arquivo anterior">◄</button>
                <button class="btn-icon btn-play" id="btnPlay" title="Play/Pause (Espaço)" aria-label="Play/Pause">▶</button>
                <button class="btn-icon" id="btnNext" title="Próximo (→)" aria-label="Próximo arquivo">►</button>
                
                <div class="volume-control" role="group" aria-label="Controle de volume">
                    <span class="volume-icon" aria-hidden="true">🔊</span>
                    <input 
                        type="range" 
                        id="volumeSlider" 
                        min="0" 
                        max="100" 
                        value="100"
                        aria-label="Volume"
                    >
                </div>
                
                <span class="time-display" id="timeDisplay" aria-live="polite">00:00 / 00:00</span>
                
                <button class="btn-icon" id="btnFullscreen" title="Tela Cheia (F)" aria-label="Tela cheia">⛶</button>
            </div>
        </main>
    </div>
    
    <div class="credits-bar">
        <span class="credits-text">💜 Desenvolvido por Misa 💜</span>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
